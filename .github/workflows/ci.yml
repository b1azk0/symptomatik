name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PUBLIC_SITE_URL: https://symptomatik.com

jobs:
  typecheck-build-unit:
    name: Typecheck + build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm validate:jsonld
      - run: pnpm validate:i18n
      - name: Check reconcile drift (soft gate)
        run: pnpm validate:reconcile-drift
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: typecheck-build-unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: typecheck-build-unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .lighthouserc.json

  linkcheck:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    needs: typecheck-build-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail 'dist/client/**/*.html'
          fail: true
